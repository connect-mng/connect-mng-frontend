name: Deploy to Beta

on:
  push:
    branches:
      - feature/initial-continous-integration

# Prevent concurrent deployments
concurrency:
  group: deploy-beta
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Beta
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the version tag back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so git has full history for tagging
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          CI: false

      - name: Bump version & create git tag
        id: version
        run: |
          git stash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore: release %s [skip ci]"
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Push tag to repo
        run: git push origin main --follow-tags

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to Beta S3
        run: |
          aws s3 sync build/ s3://${{ secrets.BETA_S3_BUCKET }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Summary
        run: |
          echo "### ✅ Beta Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** s3://${{ secrets.BETA_S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
